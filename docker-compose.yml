version: "3.8"

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scamcheck
      POSTGRES_USER: scamcheck
      POSTGRES_PASSWORD: scamcheck_db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scamcheck"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://scamcheck:scamcheck_db_password@db:5432/scamcheck
      SECRET_KEY: change-this-to-a-random-secret-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: scamcheck2026
      CORS_ORIGINS: http://localhost:3000,http://localhost
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python seed_database.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  # ── React Frontend ──
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  pgdata:
